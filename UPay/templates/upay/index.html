{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>
        {% block title %}
        Upay
        {% endblock title %}
    </title>


<style>


:root{
  --primary:#0b5cff;
  --bg:#f5f7fb;
  --card:#ffffff;
  --radius:14px;
}

*{
  box-sizing:border-box;
  font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:#222;
}

.card{
  color:white ! important;
  background: linear-gradient(to right, #0f2027, #2c5364) ! important; 
}


/* App container */
.upay-app{
  max-width:420px;
  min-height:100vh;
  margin:auto;
  background:#fff;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 40px rgba(0,0,0,0.05);
}

/* Desktop & tablet */
@media (min-width: 768px){
  body{
    display:flex;
    justify-content:center;
    background:linear-gradient(135deg,#e9efff,#f5f7fb);
  }
  .upay-app{
    margin:20px 0;
    border-radius:22px;
    overflow:hidden;
  }
}

/* Cards */
.upay-card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin:12px;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

/* Buttons */
.upay-btn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:14px;
  background:var(--primary);
  color:white;
  font-weight:600;
  font-size:16px;
}

.upay-btn:active{
  transform:scale(0.98);
}
</style>

</head>

<body style="background-color: #f0f2f5;">
  
    {% include 'upay/navbar.html' %}







    {% block content %}
    
    {% endblock content %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var popoverTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="popover"]'));
            var popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
                return new bootstrap.Popover(popoverTriggerEl, {
                    placement: 'bottom',
                    trigger: 'click',
                    sanitize: false,   // allow HTML buttons inside
                    html: true
                });
            });

            // ✅ Optional: Close popover when clicking outside
            document.addEventListener('click', function (e) {
                popoverList.forEach(function (popover) {
                    if (!popover._element.contains(e.target) && !document.querySelector('.popover')?.contains(e.target)) {
                        popover.hide();
                    }
                });
            });
        });
    </script>


</body>

</html>
