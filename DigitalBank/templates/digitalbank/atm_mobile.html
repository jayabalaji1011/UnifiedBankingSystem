{% extends "digitalbank/base.html" %}

{% block content %}
{% block extra_css %}
<style>
.atm-field{
    margin-bottom:10px;
}
</style>
{% endblock %}
<div class="atm-wrapper">
<div class="atm-card">
<a href="{% url 'digitalbank:atm_home' %}" class="atm-close">✕</a>

<div class="atm-title">📱 Verify Mobile</div>
<div id="atm-message-area">
    {% if messages %}
        {% for message in messages %}
            <div class="atm-msg {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
</div>

<form method="post">
{% csrf_token %}
<div class="atm-field">
    {{ form.mobile }}
</div>
<button class="atm-btn">Send OTP</button>
</form>

</div>
</div>

{% endblock %}
