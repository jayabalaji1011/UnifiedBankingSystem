{% extends "digitalbank/index.html" %}
{% block content %}
{% block extra_css %}
<style>

</style>
{% endblock %}
<div class="text-center mt-5">
  <h4>Bank Server Processing</h4>
  <p>Please wait while we generate your ATM Card…</p>

  <div class="spinner-border text-primary" style="width:4rem;height:4rem"></div>

  <p class="mt-3">Do not refresh or close this page</p>
</div>

<script>
setTimeout(function(){
  fetch("{% url 'digitalbank:atm_api' customer.pk action %}")
  .then(res => res.json())
  .then(data => {
    if(data.status === "success"){
        window.location.href = "{% url 'digitalbank:customer_detail' customer.pk %}";
    } else {
        alert(data.message);
        window.location.href = "{% url 'digitalbank:customer_detail' customer.pk %}";
    }
  })
}, 3000);   // UI wait first, server still runs 5–10s
</script>

{% endblock %}
